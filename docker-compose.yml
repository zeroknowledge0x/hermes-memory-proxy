# docker-compose.yml — Postgres + pgvector for Hermes Memory Proxy
# Usage: docker compose up -d db
# Then set DATABASE_URL=postgresql://proxy:proxy@localhost:5432/memory_proxy

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: proxy
      POSTGRES_PASSWORD: proxy
      POSTGRES_DB: memory_proxy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

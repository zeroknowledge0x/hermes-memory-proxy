name: Docker build & smoke test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for CI (point proxy at the mock upstream below)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://proxy:proxy@db:5432/memory_proxy
          UPSTREAM_BASE_URL=http://mock:9999/v1
          UPSTREAM_API_KEY=dummy-ci-key
          PROVIDER_TYPE=openai
          EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
          EMBEDDING_DIM=384
          CONTEXT_WINDOW=8192
          RESERVED_PCT=0.25
          DEFAULT_USER_ID=00000000-0000-0000-0000-000000000001
          SINGLE_USER_MODE=true
          EXTRACTION_ENABLED=false
          EOF

      - name: Build images
        run: docker compose build

      - name: Start stack (db + proxy)
        run: docker compose up -d db proxy

      - name: Start mock upstream (OpenAI-compatible fake, no real key needed)
        run: |
          python3 scripts/ci_mock_upstream.py 9999 &
          echo $! > /tmp/mock.pid
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:9999/v1/chat/completions -X POST \
               -H 'content-type: application/json' -d '{"model":"x","messages":[]}' >/dev/null 2>&1; then
              echo "mock upstream ready after ${i}s"; break
            fi
            sleep 1
          done

      - name: Wait for proxy health
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8899/health >/dev/null 2>&1; then
              echo "proxy healthy after ${i}s"; break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8899/health || (docker compose logs; exit 1)

      - name: Smoke test — memory write + recall through the FULL pipeline
        run: |
          # 1) Send a fact through the proxy -> mock LLM -> async memory write
          curl -fsS http://127.0.0.1:8899/v1/chat/completions \
            -H 'content-type: application/json' \
            -d '{"model":"mock","messages":[{"role":"user","content":"my name is CIbot and I love containers"}]}' \
            >/dev/null
          # 2) Give the async writer a moment
          sleep 3
          # 3) Confirm the /v1/memory endpoint returns the stored fact (proves recall)
          MEM=$(curl -fsS 'http://127.0.0.1:8899/v1/memory?limit=5&q=name')
          echo "memory: $MEM"
          echo "$MEM" | grep -qi "CIbot" || (echo "MEMORY NOT RECALLED"; docker compose logs proxy; exit 1)
          echo "SMOKE OK: fact stored + recalled via full pipeline"

      - name: Tear down
        if: always()
        run: |
          [ -f /tmp/mock.pid ] && kill "$(cat /tmp/mock.pid)" 2>/dev/null || true
          docker compose down -v

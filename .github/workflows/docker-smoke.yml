name: Docker build & smoke test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for CI (dummy upstream; proxy boots without calling it)
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://proxy:proxy@db:5432/memory_proxy
          UPSTREAM_BASE_URL=https://api.openai.com/v1
          UPSTREAM_API_KEY=dummy-ci-key
          PROVIDER_TYPE=openai
          EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
          EMBEDDING_DIM=384
          CONTEXT_WINDOW=8192
          RESERVED_PCT=0.25
          DEFAULT_USER_ID=00000000-0000-0000-0000-000000000001
          SINGLE_USER_MODE=true
          EXTRACTION_ENABLED=false
          EOF

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for proxy health
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8899/health >/dev/null 2>&1; then
              echo "proxy healthy after ${i}s"; break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8899/health || (docker compose logs; exit 1)

      - name: Smoke test — memory write + recall
        run: |
          # 1) Tell it a fact
          curl -fsS http://127.0.0.1:8899/v1/chat/completions \
            -H 'content-type: application/json' \
            -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"my name is CIbot and I love containers"}]}' \
            >/dev/null
          # 2) Ask back in a fresh request — memory should be injected
          RESP=$(curl -fsS http://127.0.0.1:8899/v1/chat/completions \
            -H 'content-type: application/json' \
            -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"what is my name?"}]}')
          echo "response: $RESP"
          # 3) Confirm the /v1/memory endpoint returns the stored fact
          MEM=$(curl -fsS 'http://127.0.0.1:8899/v1/memory?limit=5&q=name')
          echo "memory: $MEM"
          echo "$MEM" | grep -qi "CIbot" || (echo "MEMORY NOT RECALLED"; docker compose logs proxy; exit 1)
          echo "SMOKE OK: fact stored + recalled"

      - name: Tear down
        if: always()
        run: docker compose down -v

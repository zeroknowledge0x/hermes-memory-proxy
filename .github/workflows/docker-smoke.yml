name: Docker build & smoke test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for CI
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://proxy:proxy@db:5432/memory_proxy
          UPSTREAM_BASE_URL=https://api.openai.com/v1
          UPSTREAM_API_KEY=dummy-ci-key
          PROVIDER_TYPE=openai
          EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
          EMBEDDING_DIM=384
          CONTEXT_WINDOW=8192
          RESERVED_PCT=0.25
          DEFAULT_USER_ID=00000000-0000-0000-0000-000000000001
          SINGLE_USER_MODE=true
          EXTRACTION_ENABLED=false
          EOF

      - name: Build images
        run: docker compose build

      - name: Start stack (db + proxy)
        run: docker compose up -d db proxy

      - name: Wait for proxy health
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8899/health >/dev/null 2>&1; then
              echo "proxy healthy after ${i}s"; break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8899/health || (docker compose logs; exit 1)

      - name: Smoke test — programmatic memory write + recall (no LLM needed)
        run: |
          # 1) Write a fact directly via POST /v1/memory (no upstream call)
          W=$(curl -fsS -X POST http://127.0.0.1:8899/v1/memory \
            -H 'content-type: application/json' \
            -d '{"content":"CIbot loves containers and recalls without any LLM"}')
          echo "write: $W"
          echo "$W" | grep -qi '"status":"ok"\|"status": "ok"' || (echo "WRITE FAILED"; docker compose logs proxy; exit 1)
          # 2) Give the embedder/writer a moment
          sleep 3
          # 3) Recall it via GET /v1/memory?q=...
          M=$(curl -fsS 'http://127.0.0.1:8899/v1/memory?limit=5&q=CIbot')
          echo "memory: $M"
          echo "$M" | grep -qi "CIbot" || (echo "MEMORY NOT RECALLED"; docker compose logs proxy; exit 1)
          echo "SMOKE OK: fact stored + recalled via full pipeline"

      - name: Tear down
        if: always()
        run: docker compose down -v
